name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: Tidy check
        run: go mod tidy
      - name: Format check
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Docker compose config
        run: docker compose config
